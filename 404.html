<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Not Found | invite.luckyverse.tech</title>
  <meta name="description" content="The page you're looking for doesn't exist on invite.luckyverse.tech." />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#050d1a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #050d1a;
      --bg-card:   #0a1628;
      --border:    rgba(0, 212, 255, .2);
      --cyan:      #00d4ff;
      --cyan-dim:  rgba(0, 212, 255, .12);
      --cyan-glow: rgba(0, 212, 255, .35);
      --purple:    #7c3aed;
      --purple-dim: rgba(124, 58, 237, .15);
      --white:     #f0f6ff;
      --muted:     rgba(240, 246, 255, .45);
      --ease:      cubic-bezier(.16, 1, .3, 1);
    }

    html, body {
      min-height: 100%;
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--white);
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 40px 20px;
      position: relative;
    }

    /* ---- Background ---- */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, .04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, .04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
    }

    @keyframes gridShift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(124, 58, 237, .18) 0%, transparent 55%),
        radial-gradient(ellipse 50% 60% at 85% 80%, rgba(0, 212, 255, .12) 0%, transparent 55%),
        radial-gradient(ellipse 80% 80% at 50% 50%, #050d1a 40%, #020810 100%);
    }

    /* ---- Scanline overlay ---- */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, .08) 2px,
        rgba(0, 0, 0, .08) 4px
      );
      opacity: .5;
    }

    /* ---- Main card ---- */
    main {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
    }

    .card-404 {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 56px 48px 48px;
      position: relative;
      overflow: hidden;
      animation: fadeUp .8s var(--ease) both;
      box-shadow:
        0 0 0 1px rgba(0, 212, 255, .06),
        0 24px 80px rgba(0, 0, 0, .7),
        inset 0 1px 0 rgba(255, 255, 255, .04);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Top cyan accent bar */
    .card-404::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--cyan), var(--purple));
      background-size: 200% 100%;
      animation: barSlide 3s linear infinite;
    }

    @keyframes barSlide {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    /* Corner decorators */
    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--cyan);
      border-style: solid;
    }
    .corner-tl { top: 12px; left: 12px;  border-width: 1px 0 0 1px; }
    .corner-tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 12px; left: 12px;  border-width: 0 0 1px 1px; }
    .corner-br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

    /* Status badge */
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp .6s .2s var(--ease) forwards;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      animation: dotPulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--cyan-glow); }
      50%       { box-shadow: 0 0 0 6px rgba(0, 212, 255, 0); }
    }

    .status-text {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: .18em;
      color: var(--cyan);
      text-transform: uppercase;
    }

    /* Big 404 */
    .num-404 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(72px, 18vw, 108px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -.02em;
      color: transparent;
      -webkit-text-stroke: 1px rgba(0, 212, 255, .5);
      position: relative;
      margin-bottom: 4px;
      opacity: 0;
      animation: fadeUp .7s .35s var(--ease) forwards;
    }

    .num-404::after {
      content: '404';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--cyan) 0%, var(--purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: blur(18px);
      opacity: .5;
      z-index: -1;
    }

    .headline {
      font-size: clamp(18px, 4.5vw, 24px);
      font-weight: 500;
      color: var(--white);
      letter-spacing: .02em;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp .7s .48s var(--ease) forwards;
    }

    /* Glitch effect on headline */
    .headline span {
      position: relative;
      display: inline-block;
    }
    .headline span::before,
    .headline span::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      opacity: 0;
    }
    .headline span::before {
      color: var(--cyan);
      animation: glitch1 4s infinite 1s;
      clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
    }
    .headline span::after {
      color: var(--purple);
      animation: glitch2 4s infinite 1.2s;
      clip-path: polygon(0 60%, 100% 60%, 100% 75%, 0 75%);
    }

    @keyframes glitch1 {
      0%, 92%, 100% { opacity: 0; transform: translate(0); }
      94% { opacity: .7; transform: translate(-3px, 1px); }
      96% { opacity: .7; transform: translate(3px, -1px); }
      98% { opacity: 0; }
    }
    @keyframes glitch2 {
      0%, 93%, 100% { opacity: 0; transform: translate(0); }
      95% { opacity: .5; transform: translate(3px, 2px); }
      97% { opacity: .5; transform: translate(-3px, -1px); }
      99% { opacity: 0; }
    }

    .sub-msg {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp .7s .58s var(--ease) forwards;
    }

    /* Divider */
    .hr-line {
      border: none;
      border-top: 1px solid rgba(0, 212, 255, .12);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp .7s .65s var(--ease) forwards;
    }

    /* Code block */
    .code-block {
      background: rgba(0, 212, 255, .05);
      border: 1px solid rgba(0, 212, 255, .12);
      border-radius: 4px;
      padding: 14px 18px;
      margin-bottom: 32px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      text-align: left;
      opacity: 0;
      animation: fadeUp .7s .72s var(--ease) forwards;
    }

    .code-block .key   { color: var(--cyan); }
    .code-block .val   { color: rgba(240, 246, 255, .7); }
    .code-block .green { color: #4ade80; }

    /* Home button */
    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 12px 28px;
      background: linear-gradient(135deg, var(--cyan) 0%, #0077aa 100%);
      color: #020810;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .06em;
      text-decoration: none;
      border-radius: 4px;
      box-shadow: 0 0 24px rgba(0, 212, 255, .25);
      transition: transform .25s var(--ease), box-shadow .25s;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp .7s .8s var(--ease) forwards;
    }

    .home-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
      transform: translateX(-100%);
      transition: transform .5s;
    }
    .home-btn:hover::after { transform: translateX(100%); }
    .home-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 40px rgba(0, 212, 255, .45);
    }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 32px;
      font-size: 11px;
      letter-spacing: .16em;
      color: rgba(240, 246, 255, .2);
      text-transform: uppercase;
      text-align: center;
      animation: fadeUp .7s .95s var(--ease) both;
    }

    footer strong {
      color: rgba(0, 212, 255, .5);
      font-weight: 400;
    }

    @media (max-width: 480px) {
      .card-404 { padding: 44px 24px 36px; }
      .home-btn  { width: 100%; justify-content: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>

<div class="bg-glow"   aria-hidden="true"></div>
<div class="bg-grid"   aria-hidden="true"></div>
<div class="scanlines" aria-hidden="true"></div>

<main>
  <div class="card-404" role="main" aria-labelledby="err-heading">
    <!-- Corner decorators -->
    <div class="corner corner-tl" aria-hidden="true"></div>
    <div class="corner corner-tr" aria-hidden="true"></div>
    <div class="corner corner-bl" aria-hidden="true"></div>
    <div class="corner corner-br" aria-hidden="true"></div>

    <!-- Status -->
    <div class="status-row">
      <div class="status-dot" aria-hidden="true"></div>
      <span class="status-text">HTTP_ERROR :: 404 NOT_FOUND</span>
    </div>

    <!-- 404 number -->
    <div class="num-404" aria-label="Error 404">404</div>

    <!-- Headline -->
    <h1 class="headline" id="err-heading">
      <span data-text="Page Not Found">Page Not Found</span>
    </h1>

    <p class="sub-msg">
      The resource you requested doesn't exist on this server,<br />
      or it may have been moved or deleted.
    </p>

    <hr class="hr-line" />

    <!-- Debug info block -->
    <div class="code-block" aria-label="Error details">
      <div><span class="key">host</span>   <span class="val">invite.luckyverse.tech</span></div>
      <div><span class="key">status</span> <span class="val">404 Not Found</span></div>
      <div><span class="key">action</span> <span class="green">→ go back or visit home</span></div>
    </div>

    <!-- Home button -->
    <a class="home-btn" href="/" aria-label="Go to invite.luckyverse.tech homepage">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Back to Home
    </a>
  </div>
</main>

<footer role="contentinfo">
  Made with <span aria-label="love">❤️</span> by <strong>Lucky</strong> &mdash; &copy; 2026 All Rights Reserved
</footer>

</body>
</html>
